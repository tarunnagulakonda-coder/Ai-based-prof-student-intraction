databases:
  - name: lectrack-db
    databaseName: lectrack
    plan: free

services:
  - type: web
    name: lectrack
    plan: free
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "python -m gunicorn tests.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: lectrack-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.12.0
